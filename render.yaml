# Render.com Blueprint for the Sociogram backend.
# https://render.com/docs/blueprint-spec
#
# After connecting this repo on Render, this single file provisions:
#   - a managed Postgres database
#   - the Express + Prisma backend service
#
# Set FRONTEND_URL to your deployed frontend (Vercel) origin.

services:
  - type: web
    name: sociogram-api
    runtime: node
    rootDir: sociogram-backend
    plan: free
    buildCommand: npm install && npm run build && npx prisma db push --schema=prisma/schema.prod.prisma --accept-data-loss
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_IOyT2iEKwhk4@ep-muddy-cell-atx5j8l2.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://sociogram-rho.vercel.app,http://localhost:5173"
